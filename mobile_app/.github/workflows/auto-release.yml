name: Auto Release

on:
  push:
    branches:
      - main
      - master

env:
  OPENCV_VERSION: '4.9.0'

jobs:
  auto-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Increment Version
        id: versioning
        run: |
          # Read current version
          VERSION_CODE=$(grep 'VERSION_CODE=' version.properties | cut -d'=' -f2)
          VERSION_NAME=$(grep 'VERSION_NAME=' version.properties | cut -d'=' -f2)

          # Increment Version Code
          NEW_VERSION_CODE=$((VERSION_CODE + 1))

          # Increment Version Name (Minor)
          MAJOR=$(echo $VERSION_NAME | cut -d'.' -f1)
          MINOR=$(echo $VERSION_NAME | cut -d'.' -f2)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION_NAME="$MAJOR.$NEW_MINOR.0"

          # Update version.properties
          sed -i "s/VERSION_CODE=.*/VERSION_CODE=$NEW_VERSION_CODE/" version.properties
          sed -i "s/VERSION_NAME=.*/VERSION_NAME=$NEW_VERSION_NAME/" version.properties

          echo "NEW_TAG=v$NEW_VERSION_NAME" >> $GITHUB_OUTPUT
          echo "VERSION=$NEW_VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Commit version change
        run: |
          git add version.properties
          git commit -m "chore: bump version to ${{ steps.versioning.outputs.VERSION }} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Create Tag
        run: |
          git tag ${{ steps.versioning.outputs.NEW_TAG }}
          git push origin ${{ steps.versioning.outputs.NEW_TAG }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install 'platforms;android-34' 'build-tools;34.0.0'

      - name: Cache OpenCV Android SDK
        id: cache-opencv
        uses: actions/cache@v4
        with:
          path: opencv-sdk
          key: opencv-android-${{ env.OPENCV_VERSION }}

      - name: Download OpenCV Android SDK
        if: steps.cache-opencv.outputs.cache-hit != 'true'
        run: |
          curl -L -o opencv.zip "https://github.com/opencv/opencv/releases/download/${OPENCV_VERSION}/opencv-${OPENCV_VERSION}-android-sdk.zip"
          mkdir -p opencv-sdk
          unzip -q opencv.zip -d opencv-sdk
          rm opencv.zip

      - name: Configure OpenCV path in settings.gradle
        run: |
          OPENCV_PATH="$(pwd)/opencv-sdk/OpenCV-android-sdk/sdk"
          sed -i "s|project.*.projectDir = new File.*|project(':opencv').projectDir = new File('${OPENCV_PATH}')|" settings.gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        if: ${{ env.RELEASE_KEYSTORE_BASE64 != '' }}
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > app/release.jks

      - name: Build APKs
        run: ./gradlew assembleDebug assembleRelease --no-daemon
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/hrm-attend-${{ steps.versioning.outputs.VERSION }}-debug.apk
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/hrm-attend-${{ steps.versioning.outputs.VERSION }}-release.apk
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/hrm-attend-${{ steps.versioning.outputs.VERSION }}-release-unsigned.apk
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.NEW_TAG }}
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
